<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventário - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Lista de Produtos</h2>
            <a th:href="@{/products/new}" class="btn btn-light"> + Novo Produto</a>
        </div>
        <div class="card-body">
            <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>

            <table class="table table-hover align-middle mt-3">
                <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Qtd.</th>
                    <th>Categoria</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.name}" class="fw-bold"></td>
                    <td th:text="${'R$ ' + p.price}"></td>
                    <td>
                                <span th:text="${p.quantity}"
                                      th:classappend="${p.quantity < 5} ? 'badge bg-danger' : 'badge bg-success'">
                                </span>
                    </td>
                    <td th:text="${p.category}"></td>
                    <td class="text-center">
                        <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Tem certeza?')">Excluir</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
