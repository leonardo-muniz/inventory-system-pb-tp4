<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manutenção de Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white text-center">
                    <h3 class="mb-0" th:text="${productId == 0 ? 'Novo Produto' : 'Editar Produto'}"></h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="${productId == 0} ? @{/products} : @{/products/{id}(id=${productId})}"
                          th:object="${productDTO}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome:</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Descrição:</label>
                            <textarea th:field="*{description}" class="form-control" rows="2"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Preço:</label>
                                <div class="input-group">
                                    <span class="input-group-text">R$</span>
                                    <input type="number" step="0.01" th:field="*{price}" class="form-control"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"/>
                                    <div class="invalid-feedback" th:errors="*{price}"></div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Quantidade:</label>
                                <input type="number" th:field="*{quantity}" class="form-control"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{quantity}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Categoria:</label>
                            <input type="text" th:field="*{category}" class="form-control"
                                   th:classappend="${#fields.hasErrors('category')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">Salvar Produto</button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
