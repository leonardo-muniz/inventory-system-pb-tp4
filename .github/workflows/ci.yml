name: CI/CD Pipeline - TP4

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Dar permissão de execução ao Maven Wrapper
        run: chmod +x mvnw

      - name: Executar Build, Testes, JaCoCo e PMD (CI)
        run: ./mvnw clean verify

      - name: Disponibilizar o Artefato Final (CD)
        uses: actions/upload-artifact@v4
        with:
          name: inventory-system-app
          path: target/*.jar
          retention-days: 7